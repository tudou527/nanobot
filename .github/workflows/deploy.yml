name: Deploy to CapRover

on:
  workflow_dispatch:
    inputs:
      nanobot_version:
        description: 'Nanobot version (tag or branch)'
        required: false
        default: 'main'
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout nanobot repository
        uses: actions/checkout@v4
        with:
          repository: HKUDS/nanobot
          ref: ${{ github.event.inputs.nanobot_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preset Image Name
        run: echo "IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/nanobot:${{ github.event.inputs.nanobot_version }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: "${{ secrets.CAPROVER_SERVER }}"
          app: "${{ secrets.APP_NAME }}"
          token: "${{ secrets.APP_TOKEN }}"
          image: ${{ env.IMAGE_URL }}

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "📦 Image: ${{ env.IMAGE_URL }}"
          echo "🏷️  Version: ${{ github.event.inputs.nanobot_version }}"
          echo "🚀 CapRover Server: ${{ secrets.CAPROVER_SERVER }}"
